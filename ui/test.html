<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circuit Rhythm Tester</title>
    <style>
        body {
            background-color: #0b0f19;
            color: #e2e8f0;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px;
            margin: 0;
            min-height: 100vh;
        }
        h1 {
            color: #2dd4a8;
            font-size: 28px;
            margin-bottom: 25px;
            text-shadow: 0 0 10px rgba(45, 212, 168, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .controls {
            background: #111a24;
            border: 1px solid rgba(45, 212, 168, 0.3);
            padding: 20px 30px;
            border-radius: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
            max-width: 800px;
            justify-content: center;
            align-items: flex-end;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
        }
        label {
            display: flex;
            flex-direction: column;
            font-size: 13px;
            color: #94a3b8;
            font-weight: 600;
            gap: 6px;
        }
        input, select {
            padding: 10px 14px;
            background: #090f15;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            border-radius: 6px;
            font-size: 14px;
            width: 130px;
            outline: none;
            transition: all 0.2s;
        }
        input:focus, select:focus {
            border-color: #2dd4a8;
            box-shadow: 0 0 8px rgba(45, 212, 168, 0.2);
        }
        button {
            padding: 10px 24px;
            background: #2dd4a8;
            border: none;
            color: #0b0f19;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 10px rgba(45, 212, 168, 0.3);
        }
        button:hover {
            background: #23b08b;
            box-shadow: 0 0 15px rgba(45, 212, 168, 0.5);
            transform: translateY(-1px);
        }
        button:active {
            transform: translateY(1px);
        }
        .iframe-container {
            position: relative;
            background: #040608;
            border: 1px solid rgba(45, 212, 168, 0.2);
            border-radius: 12px;
            overflow: hidden;
            width: 700px;
            height: 520px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
        }
        .tip {
            margin-top: 15px;
            font-size: 13px;
            color: #64748b;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Circuit Rhythm Local Tester</h1>
    
    <div class="controls">
        <label>
            Lanes Configuration
            <select id="lanes">
                <option value="4">4 Lanes (A, S, D, F)</option>
                <option value="6" selected>6 Lanes (A, S, D, J, K, L)</option>
            </select>
        </label>
        <label>
            Note Speed (px/s)
            <input type="number" id="speed" value="300" min="50" max="600">
        </label>
        <label>
            Spawn Rate (ms)
            <input type="number" id="spawnRate" value="1000" min="200" max="3000">
        </label>
        <label>
            Notes to Win
            <input type="number" id="requiredNotes" value="20" min="5" max="60">
        </label>
        <label>
            Max Misses Allowed
            <input type="number" id="maxMissed" value="3" min="1" max="20">
        </label>
        <button id="start-btn">Start Test</button>
    </div>

    <div class="iframe-container">
        <iframe id="game-frame" src="index.html"></iframe>
    </div>

    <div class="tip">
        💡 <strong>Tip:</strong> Click inside the test area above to focus the game so keyboard inputs (A, S, D, F, J, K, L) register.
    </div>

    <script>
        const iframe = document.getElementById('game-frame');
        
        iframe.onload = () => {
            // Apply dark body background in the frame to make the UI visible locally
            iframe.contentWindow.document.body.style.backgroundColor = '#0b0f19';
            iframe.contentWindow.document.body.style.display = 'flex';
            iframe.contentWindow.document.body.style.justifyContent = 'center';
            iframe.contentWindow.document.body.style.alignItems = 'center';
            iframe.contentWindow.document.body.style.height = '100vh';
        };

        document.getElementById('start-btn').addEventListener('click', () => {
            const lanes = parseInt(document.getElementById('lanes').value);
            const speed = parseInt(document.getElementById('speed').value);
            const spawnRate = parseInt(document.getElementById('spawnRate').value);
            const requiredNotes = parseInt(document.getElementById('requiredNotes').value);
            const maxMissed = parseInt(document.getElementById('maxMissed').value);
            
            const keys = lanes === 6 ? ['A', 'S', 'D', 'J', 'K', 'L'] : ['A', 'S', 'D', 'F'];
            
            iframe.contentWindow.postMessage({
                action: 'startRhythm',
                config: {
                    lanes: lanes,
                    keys: keys,
                    noteSpeed: speed,
                    noteSpawnRate: spawnRate,
                    requiredNotes: requiredNotes,
                    maxWrongKeys: 5,
                    maxMissedNotes: maxMissed
                }
            }, '*');
            
            // Set focus inside the iframe immediately so key events work
            iframe.focus();
        });
    </script>
</body>
</html>
